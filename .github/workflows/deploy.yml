name: Deploy n8n to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy project to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.EC2_PUBLIC_IP }} 'bash -s' < n8n/scripts/deploy_n8n_ec2.sh ${{ secrets.EC2_PUBLIC_IP }}

      - name: Import n8n workflow to running instance
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -u admin:password123 \
            -d @n8n/workflows/pg_master_flow.json \
            https://n8n.pbradygeorgen.com/rest/workflows
