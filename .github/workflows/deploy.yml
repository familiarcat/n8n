name: Deploy n8n to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: n8n
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy project to EC2
        run: |
          export EC2_IP="${{ secrets.EC2_PUBLIC_IP }}"
          ssh -o StrictHostKeyChecking=no -i ./key.pem ubuntu@$EC2_IP 'bash -s' < scripts/deploy_n8n_ec2.sh

      - name: Import n8n workflow to running instance
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -u admin:password123 \
            -d @workflows/pg_master_flow.json \
            https://n8n.pbradygeorgen.com/rest/workflows
