name: Deploy n8n to EC2
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Deploy to EC2
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_USER: ec2-user
          SERVER_IP: ${{ secrets.EC2_PUBLIC_IP }}
          TARGET: ~/n8n
          SOURCE: ./
